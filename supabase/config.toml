# Configuração mínima do Supabase CLI para o projeto Aliança Log.
# As migrations em supabase/migrations/ são aplicadas pelo runner próprio:
#   npm run db:migrate      (ver docs/MIGRATIONS.md)
# Este config.toml só é necessário se for usar o Supabase CLI localmente.
project_id = "alianca-log"

[db]
# Versão do Postgres usada pelo Supabase.
major_version = 17
